<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprout Weeder — The Most Cost Effective “Biological Window” 
i.e. Early-Stage Sprouting Weeds  (3–5 days)  When Weeds Are Weakest
</title>
  <meta name="description" content="Sprout Weeder — Reduce labour cost by 60% with fast, eco-friendly weed management for Indian farms."/>
  <style>
    :root{
      --bg:#0b1220; --card:#111a2e; --muted:#9fb0d0; --text:#e6eefc;
      --green:#22c55e; --green-2:#16a34a; --accent:#38bdf8;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:radial-gradient(1200px 600px at 20% -10%,#1b2a4a 0%,transparent 60%),var(--bg);color:var(--text);}
    a{color:inherit;text-decoration:none}
    .container{max-width:1100px;margin:auto;padding:0 20px}

    /* NAV */
    .nav{position:sticky;top:0;background:rgba(11,18,32,.6);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.06);z-index:10}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
    .brand{font-weight:800;letter-spacing:.3px}
    .nav a.btn{margin-left:10px}

    /* HERO */
    .hero{padding:80px 0 40px}
    .hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:28px;align-items:center}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(56,189,248,.15);color:#7dd3fc;font-size:12px;margin-bottom:14px}
    h1{font-size:44px;line-height:1.1;margin:0 0 12px}
    .lead{font-size:18px;color:var(--muted);margin-bottom:18px}
    .cta{display:flex;gap:12px;flex-wrap:wrap}
    .btn{padding:12px 18px;border-radius:10px;border:1px solid rgba(255,255,255,.08);font-weight:700;cursor:pointer}
    .btn.primary{background:linear-gradient(135deg,var(--green),var(--green-2));color:#052e16;border:none}
    .btn.ghost{background:transparent}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
    .kpi{background:var(--card);padding:14px;border-radius:12px;text-align:center}
    .kpi b{font-size:20px}

    .hero-card{background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px}
    .hero-card img{width:100%;border-radius:12px}

    /* SECTIONS */
    section{padding:60px 0}
    h2{font-size:28px;margin:0 0 18px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .card{background:var(--card);border:1px solid rgba(255,255,255,.08);padding:18px;border-radius:14px;min-height:90px}
    .card small{color:var(--muted)}

    /* HOW */
    .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .step{background:var(--card);padding:18px;border-radius:14px;border:1px solid rgba(255,255,255,.08)}
    .num{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.2);margin-bottom:8px}

    /* CTA */
    .cta-box{display:flex;align-items:center;justify-content:space-between;gap:16px;background:linear-gradient(135deg,#0f1a33,#0b1220);border:1px solid rgba(255,255,255,.08);padding:20px;border-radius:16px}

    /* FOOTER */
    footer{border-top:1px solid rgba(255,255,255,.08);padding:24px 0;color:var(--muted)}

    /* RESPONSIVE */
    @media (max-width:900px){
      .hero-grid{grid-template-columns:1fr}
      .grid{grid-template-columns:1fr 1fr}
      .steps{grid-template-columns:1fr 1fr}
      h1{font-size:36px}
    }
    @media (max-width:520px){
      .grid,.steps{grid-template-columns:1fr}
      .kpis{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <div class="nav">
    <div class="container nav-inner">
      <div class="brand">Sprout Weeder ??</div>
      <div>
        <a href="#solution" class="btn ghost">Solution</a>
        <a href="#impact" class="btn ghost">Impact</a>
        <a href="#contact" class="btn primary">Book Demo</a>
      </div>
    </div>
  </div>

 
      <div class="hero-card">
        <img src="https://github.com/sproutweeder/sproutweeder-site/blob/main/indexImage.jpeg q=80&w=1200&auto=format&fit=crop" alt="Farm field"/>
      </div>
    </div>
  </div>


  <footer>
    <div class="container">© 2026 Sprout Weeder • Contact: +91 XXXXX XXXXX</div>
  </footer
</body>
</html>
